name: skill-evals

# Phase 2 of the Sentinel skill-eval harness (issue #74, ADR-0024). On a PR that
# touches a skill or the eval assets, run only what the diff affects: the changed
# skill's fixture-outcome self-test + a scoped lint.
#
# Both steps gate (see ADR-0024, gate flipped on 2026-07-16 once every case had a
# passing LLM-judge meta-eval):
#   * The HARNESS TOOL self-tests — deterministic unit checks that the linter and
#     the change-detector themselves work.
#   * The CHANGE-DETECTION step (`--gate`) — a changed skill whose offline
#     self-test stops discriminating, or a lint error, fails the check. The
#     self-test grades RECORDED samples with the OFFLINE heuristic judge (no API
#     key here — the LLM meta-eval stays a manual step), so a failure is a
#     deterministic regression in the case or its samples, never a judgment call.
#     The per-skill job summary is still written before the gate is applied.
on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'evals/**'

concurrency:
  group: skill-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skill-evals:
    name: changed-skill evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the PR base commit present so `git diff base...HEAD` resolves.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Gate: prove the harness tooling itself is not broken. Deterministic,
      # offline, zero-dep — no judgment involved, so a failure fails the build.
      - name: Harness self-tests (gating)
        run: |
          set -euo pipefail
          node evals/lint.mjs --self-test
          node evals/changed.mjs --self-test

      # The Gate skill ships a DETERMINISTIC decision function, unlike the
      # prose skills — so it earns a golden truth-table test, not just an LLM-judged
      # eval. This gates: if the worst-wins gate stops matching contract-v0's truth
      # table, or a numeric field leaks into the gate predicate (honesty guard #3),
      # the build fails. Deterministic, offline, zero-dep — no judgment involved.
      - name: Gate golden self-test (gating)
        run: node skills/gate/gate.mjs --self-test

      # Gate: run only the affected skills' self-tests + scoped lint, write the
      # job summary, then fail the check if any self-test stopped discriminating
      # or lint errored. Trust established via per-case LLM-judge meta-evals.
      - name: Changed-skill evals (gating)
        run: node evals/changed.mjs --base=${{ github.event.pull_request.base.sha }} --gate
